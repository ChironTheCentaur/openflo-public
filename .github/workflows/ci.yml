name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Use requirements.txt for the runtime surface so CI tracks
          # exactly what users get, then add dev tools on top.
          pip install -r requirements.txt
          pip install "pyright[nodejs]" pytest ruff
          # Install the package itself (deps already pinned above) so the
          # test suite can `import openflo`.
          pip install -e . --no-deps

      - name: Lint
        run: ruff check .

      - name: Type check
        run: pyright

      - name: Test
        # Linux CI has no Tk display — point matplotlib at the headless
        # Agg backend (run_analysis.py already does this) and skip the
        # GUI smoke test if/when we add one. Tests don't import gui.py.
        env:
          MPLBACKEND: Agg
        run: pytest -q
