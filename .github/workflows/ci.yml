name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Xvfb (Linux — virtual display for the Tk GUI tests)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Use requirements.txt for the runtime surface so CI tracks
          # exactly what users get, then add dev tools on top.
          pip install -r requirements.txt
          # Pin ruff + pyright so CI and local (the dev extra) flag the same
          # things — an unpinned ruff bump silently broke Lint once.
          pip install "pyright[nodejs]==1.1.410" pytest pytest-xdist "ruff==0.15.19"
          # Install the package itself (deps already pinned above) so the
          # test suite can `import openflo`.
          pip install -e . --no-deps

      - name: Lint
        run: ruff check .

      - name: Type check
        run: pyright

      # The GUI/continuity tests are Tk-guarded: they need a display or they
      # skip. Run them under a virtual framebuffer on Linux so they actually
      # execute in CI; Windows runners already have a desktop session.
      - name: Test (Linux, under Xvfb)
        if: runner.os == 'Linux'
        env:
          MPLBACKEND: Agg
        run: xvfb-run -a pytest -n auto -q

      - name: Test (Windows)
        if: runner.os == 'Windows'
        env:
          MPLBACKEND: Agg
        run: pytest -n auto -q
