# Run with:  pre-commit run --all-files
# Install with: pip install pre-commit && pre-commit install
#
# Lightweight: just the hooks that catch the F821 / B023 / unused-import
# class of bug before commit, plus trailing-whitespace / EOF housekeeping.
# Pyright is intentionally CI-only (slow to install + nodejs dependency).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # ruff-pre-commit pins the ruff version itself — keep this in sync
    # with the version in pyproject.toml [project.optional-dependencies].dev
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
